name: Build and push test-natk-admin to GHCR

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  IMAGE_NAME: test-natk-admin  # имя образа

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Set lowercase owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_ID=ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}
          VERSION=${{ github.sha }}

          docker build -f ./test-natk-admin/Dockerfile -t $IMAGE_ID:$VERSION -t $IMAGE_ID:latest ./test-natk-admin
          docker push $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:latest